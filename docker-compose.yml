services:
  # ── Infrastructure ───────────────────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
      POSTGRES_DB: ticketing
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ticketing" ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 10

  # ── Microservices ────────────────────────────────────────────────────────────
  event-service:
    build: ./services/event-service
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql://ticketing:ticketing@postgres:5432/events_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ticket-service:
    build: ./services/ticket-service
    ports:
      - "8002:8002"
    environment:
      DATABASE_URL: postgresql://ticketing:ticketing@postgres:5432/tickets_db
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8002/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  payment-service:
    build: ./services/payment-service
    ports:
      - "8003:8003"
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8003/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  booking-orchestrator:
    build: ./services/booking-orchestrator
    ports:
      - "8004:8004"
    environment:
      TICKET_SERVICE_URL: http://ticket-service:8002
      PAYMENT_SERVICE_URL: http://payment-service:8003
    depends_on:
      ticket-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ── API Gateway (Nginx) ───────────────────────────────────────────────────────
  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./frontend:/usr/share/nginx/html
    depends_on:
      - event-service
      - ticket-service
      - payment-service
      - booking-orchestrator

volumes:
  postgres_data:
  redis_data:
